<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a0000, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 380px;
      padding: 40px 30px;
      border-radius: 16px;
      background: rgba(15, 0, 0, 0.92);
      box-shadow: 0 10px 40px rgba(255,0,0,0.25);
      text-align: center;
    }
    h2 {
      color: #ff3333;
      margin-bottom: 32px;
      font-size: 1.8rem;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0a0a0a;
      color: white;
      font-size: 1.05rem;
      transition: all 0.25s;
    }
    input:focus {
      outline: none;
      border-color: #ff4444;
      box-shadow: 0 0 0 3px rgba(255,68,68,0.2);
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #e60000, #b30000);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(230,0,0,0.4);
    }
    button:active { transform: translateY(0); }
    .error {
      color: #ff9999;
      font-size: 0.95rem;
      margin-top: 16px;
      min-height: 1.3em;
    }
    .loading {
      display: none;
      color: #ffcc66;
      margin-top: 16px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>تسجيل الدخول</h2>

  <div class="input-group">
    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="username">
  </div>
  <div class="input-group">
    <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
  </div>
  <div class="input-group">
    <input type="text" id="code" placeholder="كود الاشتراك" autocomplete="off">
  </div>

  <button id="loginBtn" onclick="login()">دخول</button>

  <div class="error" id="errorMsg"></div>
  <div class="loading" id="loading">جاري التحقق...</div>
</div>

<script>
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');
const loading = document.getElementById('loading');

function showError(text) {
  errorMsg.textContent = text;
}

function clearError() {
  errorMsg.textContent = '';
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const code = document.getElementById('code').value.trim();

  if (!username || !password || !code) {
    showError('كل الحقول مطلوبة');
    return;
  }

  clearError();
  loading.style.display = 'block';
  loginBtn.disabled = true;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, code })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || 'حدث خطأ أثناء تسجيل الدخول');
      return;
    }

    // حفظ التوكن (الأهم)
    localStorage.setItem('authToken', data.token);

    // اختياري: حفظ اسم المستخدم فقط (للعرض لاحقًا)
    localStorage.setItem('username', username);

    // التوجيه حسب نوع الحساب
    if (data.isAdmin === true) {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'gp.html';   // صفحة المستخدم العادي
    }

  } catch (err) {
    showError('تعذر الاتصال بالخادم. تحقق من الإنترنت');
    console.error(err);
  } finally {
    loading.style.display = 'none';
    loginBtn.disabled = false;
  }
}

// السماح بالدخول بضغط Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
